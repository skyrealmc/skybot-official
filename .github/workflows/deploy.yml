name: Auto Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Go to your bot folder
            cd /home/ubuntu/skybot-official

            # Pull latest code
            git pull origin main

            # Install dependencies (safe)
            npm install --production

            # Restart bots using PM2
            pm2 reload all || pm2 restart all

            # Save PM2 state
            pm2 save
