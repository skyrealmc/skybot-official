<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base Manager - Sky Realms SMP</title>
    <style>
        :root {
            --bg-primary: #36393f;
            --bg-secondary: #2f3136;
            --bg-tertiary: #202225;
            --text-primary: #dcddde;
            --text-muted: #72767d;
            --border: #202225;
            --accent: #5865f2;
            --success: #43b581;
            --danger: #f04747;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: #4752c4;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #d83c3a;
        }

        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--bg-tertiary);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            background-color: var(--bg-secondary);
            border: 2px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            border-color: var(--accent);
            background-color: var(--accent);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .article-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
        }

        .article-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.3);
        }

        .article-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .article-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            flex: 1;
        }

        .article-category {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .article-preview {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .article-actions {
            display: flex;
            gap: 8px;
        }

        .article-actions button {
            padding: 6px 12px;
            font-size: 0.9rem;
            flex: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(88, 101, 242, 0.3);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .form-actions button {
            flex: 1;
        }

        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .alert-success {
            background-color: rgba(67, 181, 129, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background-color: rgba(240, 71, 71, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .alert-info {
            background-color: rgba(88, 101, 242, 0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .no-articles {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .keywords-input {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            padding: 8px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            min-height: 40px;
        }

        .keyword-tag {
            background-color: var(--accent);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .keyword-tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
        }

        .keywords-input input {
            flex: 1;
            min-width: 100px;
            background: none;
            border: none;
            color: var(--text-primary);
            outline: none;
        }

        .menu {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .menu a {
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            padding-bottom: 8px;
        }

        .menu a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        @media (max-width: 768px) {
            .articles-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions button {
                flex: 1;
            }

            .modal-content {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Knowledge Base Manager</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openNewArticleModal()">+ New Article</button>
            </div>
        </header>

        <div class="menu">
            <a href="/dashboard">Dashboard</a>
            <a href="/scheduler">Scheduler</a>
            <a href="/analytics">Analytics</a>
            <a href="/whitelist">Whitelist</a>
            <a href="/knowledge-base" style="color: var(--accent); border-bottom-color: var(--accent);">Knowledge Base</a>
        </div>

        <div id="alertContainer"></div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterArticles('all')">All</button>
            <button class="filter-btn" onclick="filterArticles('whitelist')">Whitelist</button>
            <button class="filter-btn" onclick="filterArticles('rules')">Rules</button>
            <button class="filter-btn" onclick="filterArticles('getting-started')">Getting Started</button>
            <button class="filter-btn" onclick="filterArticles('troubleshooting')">Troubleshooting</button>
            <button class="filter-btn" onclick="filterArticles('community')">Community</button>
            <button class="filter-btn" onclick="filterArticles('general')">General</button>
        </div>

        <div id="articlesContainer" class="articles-grid">
            <div class="loading">Loading articles...</div>
        </div>
    </div>

    <!-- Article Modal -->
    <div id="articleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">New Article</div>

            <div class="form-group">
                <label class="form-label">Category *</label>
                <select id="articleCategory" class="form-control">
                    <option value="">Select a category...</option>
                    <option value="whitelist">Whitelist</option>
                    <option value="rules">Rules</option>
                    <option value="getting-started">Getting Started</option>
                    <option value="troubleshooting">Troubleshooting</option>
                    <option value="community">Community</option>
                    <option value="general">General</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Title *</label>
                <input type="text" id="articleTitle" class="form-control" placeholder="Article title">
            </div>

            <div class="form-group">
                <label class="form-label">Content *</label>
                <textarea id="articleContent" class="form-control" placeholder="Article content (supports markdown)"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Keywords (comma-separated)</label>
                <input type="text" id="articleKeywords" class="form-control" placeholder="keyword1, keyword2, keyword3">
            </div>

            <div class="form-group">
                <label class="form-label">Priority (0-10)</label>
                <input type="number" id="articlePriority" class="form-control" min="0" max="10" value="0">
            </div>

            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeArticleModal()">Cancel</button>
                <button class="btn btn-primary" id="saveArticleBtn" onclick="saveArticle()">Save Article</button>
            </div>
        </div>
    </div>

    <script>
        let currentEditingId = null;
        let currentFilter = 'all';

        async function loadArticles(category = null) {
            try {
                const url = category ? `/api/knowledge-base/articles?category=${category}` : '/api/knowledge-base/articles';
                const response = await fetch(url, {
                    credentials: 'include'
                });

                if (!response.ok) throw new Error('Failed to load articles');

                const data = await response.json();
                displayArticles(data.articles);
            } catch (error) {
                console.error('Error loading articles:', error);
                showAlert('Error loading articles', 'error');
            }
        }

        function displayArticles(articles) {
            const container = document.getElementById('articlesContainer');

            if (articles.length === 0) {
                container.innerHTML = '<div class="no-articles">No articles found. Create one to get started!</div>';
                return;
            }

            container.innerHTML = articles.map(article => `
                <div class="article-card">
                    <div class="article-header">
                        <div class="article-title">${article.title}</div>
                        <span class="article-category">${article.category}</span>
                    </div>
                    <div class="article-preview">${article.content.substring(0, 100)}...</div>
                    <div class="article-meta">
                        <span>Priority: ${article.priority}</span>
                        <span>${new Date(article.createdAt).toLocaleDateString()}</span>
                    </div>
                    <div class="article-actions">
                        <button class="btn btn-primary" onclick="editArticle('${article._id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteArticle('${article._id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function openNewArticleModal() {
            currentEditingId = null;
            document.getElementById('modalTitle').textContent = 'New Article';
            document.getElementById('articleCategory').value = '';
            document.getElementById('articleTitle').value = '';
            document.getElementById('articleContent').value = '';
            document.getElementById('articleKeywords').value = '';
            document.getElementById('articlePriority').value = 0;
            document.getElementById('articleModal').classList.add('active');
        }

        async function editArticle(id) {
            try {
                const response = await fetch(`/api/knowledge-base/articles?category=${id}`, {
                    credentials: 'include'
                });
                
                // For now, we'll need to fetch from the current articles list
                // In a real app, you'd have a GET /api/knowledge-base/articles/:id endpoint
                currentEditingId = id;
                document.getElementById('modalTitle').textContent = 'Edit Article';
                document.getElementById('articleModal').classList.add('active');
            } catch (error) {
                console.error('Error loading article:', error);
                showAlert('Error loading article', 'error');
            }
        }

        async function saveArticle() {
            const category = document.getElementById('articleCategory').value;
            const title = document.getElementById('articleTitle').value;
            const content = document.getElementById('articleContent').value;
            const keywords = document.getElementById('articleKeywords').value
                .split(',')
                .map(k => k.trim())
                .filter(k => k);
            const priority = parseInt(document.getElementById('articlePriority').value) || 0;

            if (!category || !title || !content) {
                showAlert('Please fill in all required fields', 'error');
                return;
            }

            try {
                const method = currentEditingId ? 'PUT' : 'POST';
                const url = currentEditingId 
                    ? `/api/knowledge-base/articles/${currentEditingId}`
                    : '/api/knowledge-base/articles';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, title, content, keywords, priority }),
                    credentials: 'include'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to save article');
                }

                showAlert(currentEditingId ? 'Article updated!' : 'Article created!', 'success');
                closeArticleModal();
                loadArticles(currentFilter === 'all' ? null : currentFilter);
            } catch (error) {
                console.error('Error saving article:', error);
                showAlert(error.message, 'error');
            }
        }

        async function deleteArticle(id) {
            if (!confirm('Are you sure you want to delete this article?')) return;

            try {
                const response = await fetch(`/api/knowledge-base/articles/${id}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });

                if (!response.ok) throw new Error('Failed to delete article');

                showAlert('Article deleted!', 'success');
                loadArticles(currentFilter === 'all' ? null : currentFilter);
            } catch (error) {
                console.error('Error deleting article:', error);
                showAlert('Error deleting article', 'error');
            }
        }

        function filterArticles(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            loadArticles(category === 'all' ? null : category);
        }

        function closeArticleModal() {
            document.getElementById('articleModal').classList.remove('active');
        }

        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);

            setTimeout(() => alert.remove(), 5000);
        }

        // Load articles on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadArticles();
        });

        // Close modal when clicking outside
        document.getElementById('articleModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('articleModal')) {
                closeArticleModal();
            }
        });
    </script>
</body>
</html>
