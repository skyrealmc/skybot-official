<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whitelist Management</title>
    <meta name="description" content="Manage whitelist applications and approvals" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.svg" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
        /* Whitelist Management Styles - Matches dashboard theme */
        .whitelist-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .whitelist-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            min-height: 0;
        }

        .whitelist-sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .whitelist-sidebar-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .whitelist-sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .whitelist-menu-item {
            padding: 10px 14px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all var(--transition);
            cursor: pointer;
            background: transparent;
            border: none;
            text-align: left;
            width: 100%;
        }

        .whitelist-menu-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .whitelist-menu-item.active {
            background: var(--accent-light);
            color: var(--accent);
            border-left: 3px solid var(--accent);
            padding-left: 11px;
        }

        .whitelist-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .whitelist-header {
            margin-bottom: 32px;
        }

        .whitelist-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .whitelist-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .whitelist-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .whitelist-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .whitelist-filter-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--transition);
        }

        .whitelist-filter-btn:hover {
            color: var(--text-primary);
        }

        .whitelist-filter-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .whitelist-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
        }

        .whitelist-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 16px;
        }

        .whitelist-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .whitelist-search {
            flex: 1;
            max-width: 300px;
        }

        .whitelist-search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .whitelist-search-input::placeholder {
            color: var(--text-muted);
        }

        .whitelist-search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        .whitelist-table-responsive {
            overflow-x: auto;
        }

        .whitelist-table {
            width: 100%;
            border-collapse: collapse;
        }

        .whitelist-table thead {
            background: var(--bg-tertiary);
        }

        .whitelist-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 1px solid var(--border);
        }

        .whitelist-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .whitelist-table tbody tr:hover {
            background: var(--bg-hover);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: var(--radius-md);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .status-badge.approved {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all var(--transition);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        .form-help {
            display: block;
            margin-top: 4px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .empty-state-text {
            font-size: 0.95rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .whitelist-layout {
                grid-template-columns: 1fr;
            }

            .whitelist-sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .whitelist-content {
                padding: 16px;
            }

            .whitelist-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .whitelist-card-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .whitelist-search {
                max-width: 100%;
            }

            .whitelist-table {
                font-size: 0.85rem;
            }

            .whitelist-table th,
            .whitelist-table td {
                padding: 8px;
            }

            .action-buttons {
                flex-wrap: wrap;
            }

            .modal-content {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="whitelist-page" id="whitelistPage">
        <div class="whitelist-layout">
            <!-- Sidebar -->
            <aside class="whitelist-sidebar">
                <div class="whitelist-sidebar-title">Menu</div>
                <nav class="whitelist-sidebar-menu">
                    <a href="/" class="whitelist-menu-item">Messages</a>
                    <a href="/templates" class="whitelist-menu-item">Templates</a>
                    <a href="/scheduler" class="whitelist-menu-item">Scheduler</a>
                    <a href="/analytics" class="whitelist-menu-item">Analytics</a>
                    <a href="/whitelist" class="whitelist-menu-item active">Whitelist</a>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="whitelist-content">
                <div class="whitelist-header">
                    <h1 class="whitelist-title">Whitelist Management</h1>
                    <p class="whitelist-subtitle">Review and manage whitelist applications</p>
                </div>

                <!-- Statistics -->
                <div class="whitelist-stats">
                    <div class="stat-card">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="pendingCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Approved</div>
                        <div class="stat-value" id="approvedCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Rejected</div>
                        <div class="stat-value" id="rejectedCount">0</div>
                    </div>
                </div>

                <!-- Filter Tabs -->
                <div class="whitelist-filters">
                    <button class="whitelist-filter-btn active" data-filter="">All</button>
                    <button class="whitelist-filter-btn" data-filter="pending">Pending</button>
                    <button class="whitelist-filter-btn" data-filter="approved">Approved</button>
                    <button class="whitelist-filter-btn" data-filter="rejected">Rejected</button>
                </div>

                <!-- Applications Table -->
                <div class="whitelist-card">
                    <div class="whitelist-card-header">
                        <h2 class="whitelist-card-title">Applications</h2>
                        <div class="whitelist-search">
                            <input type="text" id="searchInput" placeholder="Search username or email..." class="whitelist-search-input">
                        </div>
                    </div>

                    <div class="whitelist-table-responsive">
                        <table class="whitelist-table">
                            <thead>
                                <tr>
                                    <th>Username</th>
                                    <th>Discord ID</th>
                                    <th>Email</th>
                                    <th>Age</th>
                                    <th>Status</th>
                                    <th>Applied</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="applicationsTableBody">
                                <tr>
                                    <td colspan="7" class="empty-state" style="padding: 32px;">
                                        <div class="empty-state-icon">📋</div>
                                        <p class="empty-state-text">Loading applications...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal for Application Details -->
    <div id="applicationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Application Details</h2>
                <button class="modal-close" onclick="closeApplicationModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeApplicationModal()">Close</button>
                <button class="btn btn-danger" id="rejectBtn" onclick="rejectApplication()" style="display:none;">Reject</button>
                <button class="btn btn-success" id="approveBtn" onclick="approveApplication()" style="display:none;">Approve</button>
            </div>
        </div>
    </div>

    <script>
        let currentApplicationId = null;
        let currentFilter = '';

        document.addEventListener('DOMContentLoaded', () => {
            loadApplications();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.querySelectorAll('.whitelist-filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.whitelist-filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    loadApplications();
                });
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                filterTableRows(e.target.value);
            });

            document.getElementById('applicationModal').addEventListener('click', (e) => {
                if (e.target.id === 'applicationModal') closeApplicationModal();
            });
        }

        async function loadApplications() {
            try {
                const url = currentFilter
                    ? `/api/whitelist/list?status=${currentFilter}`
                    : '/api/whitelist/list';

                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to load applications');

                const data = await response.json();
                displayApplications(data.applications || []);
                updateStats(data.applications || []);
            } catch (error) {
                console.error('Error loading applications:', error);
                document.getElementById('applicationsTableBody').innerHTML =
                    '<tr><td colspan="7" class="empty-state" style="color: var(--danger);">Failed to load applications</td></tr>';
            }
        }

        function displayApplications(applications) {
            const tbody = document.getElementById('applicationsTableBody');

            if (applications.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="empty-state-icon">📭</div><p class="empty-state-text">No applications found</p></td></tr>';
                return;
            }

            tbody.innerHTML = applications.map(app => `
                <tr>
                    <td><strong>${escapeHtml(app.minecraftUsername)}</strong></td>
                    <td><code style="background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;">${app.discordId}</code></td>
                    <td>${escapeHtml(app.email)}</td>
                    <td>${app.age}</td>
                    <td><span class="status-badge ${app.status}">${app.status}</span></td>
                    <td><small>${new Date(app.createdAt).toLocaleDateString()}</small></td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-primary" onclick="viewApplication('${app._id}')">View</button>
                            ${app.status === 'pending' ? `
                                <button class="btn btn-success" onclick="openApproveModal('${app._id}')">Approve</button>
                                <button class="btn btn-danger" onclick="quickReject('${app._id}')">Reject</button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(applications) {
            const stats = { pending: 0, approved: 0, rejected: 0 };
            applications.forEach(app => { stats[app.status]++; });
            document.getElementById('pendingCount').textContent = stats.pending;
            document.getElementById('approvedCount').textContent = stats.approved;
            document.getElementById('rejectedCount').textContent = stats.rejected;
        }

        function filterTableRows(searchTerm) {
            const rows = document.querySelectorAll('#applicationsTableBody tr');
            const term = searchTerm.toLowerCase();
            rows.forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        }

        async function viewApplication(id) {
            try {
                const response = await fetch(`/api/whitelist/${id}`);
                if (!response.ok) throw new Error('Failed to load application');

                const data = await response.json();
                const app = data.application;

                currentApplicationId = id;
                const modal = document.getElementById('applicationModal');
                const modalBody = document.getElementById('modalBody');

                modalBody.innerHTML = `
                    <div style="display: grid; gap: 12px;">
                        <div>
                            <label style="display: block; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">Minecraft Username</label>
                            <div style="color: var(--text-primary);">${escapeHtml(app.minecraftUsername)}</div>
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">Discord ID</label>
                            <code style="background: var(--bg-tertiary); padding: 4px 8px; border-radius: 4px; display: inline-block;">${app.discordId}</code>
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">Email</label>
                            <div style="color: var(--text-primary);">${escapeHtml(app.email)}</div>
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">Age</label>
                            <div style="color: var(--text-primary);">${app.age}</div>
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">Status</label>
                            <div><span class="status-badge ${app.status}">${app.status}</span></div>
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">Applied</label>
                            <div style="color: var(--text-primary);">${new Date(app.createdAt).toLocaleString()}</div>
                        </div>
                        ${app.status !== 'pending' ? `
                            <div>
                                <label style="display: block; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">Reviewed By</label>
                                <div style="color: var(--text-primary);">${escapeHtml(app.reviewedBy || 'N/A')}</div>
                            </div>
                            <div>
                                <label style="display: block; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">Reviewed At</label>
                                <div style="color: var(--text-primary);">${app.reviewedAt ? new Date(app.reviewedAt).toLocaleString() : 'N/A'}</div>
                            </div>
                        ` : ''}
                    </div>
                `;

                document.getElementById('approveBtn').style.display = app.status === 'pending' ? 'block' : 'none';
                document.getElementById('rejectBtn').style.display = app.status === 'pending' ? 'block' : 'none';
                modal.classList.add('active');
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to load application');
            }
        }

        function openApproveModal(id) {
            currentApplicationId = id;
            const modal = document.getElementById('applicationModal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="form-group">
                    <label class="form-label">Custom Approval Message (optional)</label>
                    <textarea id="customMessage" class="form-control" rows="4" placeholder="Leave blank for default message"></textarea>
                </div>
            `;

            document.getElementById('approveBtn').style.display = 'block';
            document.getElementById('rejectBtn').style.display = 'none';
            modal.classList.add('active');
        }

        async function approveApplication() {
            if (!currentApplicationId) return;

            try {
                const customMessage = document.getElementById('customMessage')?.value || '';
                const response = await fetch(`/api/whitelist/approve/${currentApplicationId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ approvalMessage: customMessage })
                });

                if (!response.ok) throw new Error('Failed to approve');

                alert('Application approved!');
                closeApplicationModal();
                loadApplications();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to approve application');
            }
        }

        async function rejectApplication() {
            if (!currentApplicationId || !confirm('Reject this application?')) return;

            try {
                const response = await fetch(`/api/whitelist/reject/${currentApplicationId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Failed to reject');

                alert('Application rejected');
                closeApplicationModal();
                loadApplications();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to reject application');
            }
        }

        async function quickReject(id) {
            if (!confirm('Reject this application?')) return;
            currentApplicationId = id;
            rejectApplication();
        }

        function closeApplicationModal() {
            document.getElementById('applicationModal').classList.remove('active');
            currentApplicationId = null;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
